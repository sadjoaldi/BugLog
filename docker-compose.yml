services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buglog-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/dev.db:/app/dev.db
    ports:
      - "3000:3000"
    command: pnpm dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: buglog-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:80"
    depends_on:
      - backend
